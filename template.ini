[paths]
datas_dir = shared/datas/
packets_dir = shared/packets/
db_schema = server/db/schema.json
client_generated = client/project-fill/Assets/Resources/
client_scripts_generated = client/project-fill/Assets/Scripts/Data/Generated/
server_generated = server/generated/
server_scripts_generated = server/generated/scripts/
migrations_dir = server/db/migrations/
orm_generated_dir = server/src/ProjectFill.Infrastructure/Generated/
proto_generated = generated/proto/

[data-gen]
client_targets = CS,C
server_targets = CS,S
client_namespace = ProjectFill.Data.Generated
server_namespace = ProjectFill.Generated.Data
domain_static_data_dir = server/src/ProjectFill.Domain/StaticData/
domain_static_data_namespace = ProjectFill.Domain.StaticData
domain_interface_file = server/src/ProjectFill.Domain/Interfaces/IStaticDataService.g.cs
domain_interface_namespace = ProjectFill.Domain.Interfaces
infrastructure_static_data_service_file = server/src/ProjectFill.Infrastructure/Data/StaticDataService.g.cs
infrastructure_data_namespace = ProjectFill.Infrastructure.Data
game_types_namespace = ProjectFill.Contracts.GameTypes

[packet-gen]
client_output_dir = client/project-fill/Assets/Scripts/Generated/Contracts/

[orm-gen]
dry_run = false

[font-subset]
config = tools/subset_tool/config.json
source_dir = tools/subset_tool/sources/
target_dir = client/project-fill/Assets/TextMesh Pro/Fonts/
string_datas_dir = shared/datas/string/

[info-gen-skip]
; Domain POCO / auto-service codegen exclusions (moved out of info_generator.js).
; domain_subdirs:    whole CSV subdirectories skipped for Domain POCO + auto-service
; domain_poco_files: individual CSV basenames skipped for Domain POCO (also skipped for auto-service)
; auto_service_files: extra CSV basenames skipped for auto-service only (POCO still generated)
domain_subdirs = ingame,string,tutorial
domain_poco_files = outgame_shop_catalog,config_reward_group,config_reward_item
auto_service_files = streak_challenge_event

[stage-editor-generator]
; Signal Sort stage_editor defaults (tools/stage_editor). New-stage scaffold + Generate controls.
types = 4
lane_count = 6
difficulty = 0
max_attempts = 100
